<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Reset Password — TradeJournal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#07090d;--panel:#111820;--border:#1c2b3a;--text:#d4dde8;--muted:#5a7080;--green:#00e5a0;--red:#ff4757}
    body{background:var(--bg);color:var(--text);font-family:"Inter",sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .box{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:40px;width:100%;max-width:420px}
    .logo{text-align:center;margin-bottom:28px}
    .logo-icon{font-size:28px;margin-bottom:8px}
    .logo-text{font-size:20px;font-weight:900}
    .logo-text span{color:var(--green)}
    h2{font-size:18px;font-weight:700;margin-bottom:8px;text-align:center}
    .sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:28px;line-height:1.6}
    label{font-size:12px;color:var(--muted);font-weight:600;letter-spacing:.04em;text-transform:uppercase;display:block;margin-bottom:6px;margin-top:14px}
    input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:11px 14px;font-size:14px;font-family:"Inter",sans-serif;outline:none;transition:border-color .2s}
    input:focus{border-color:var(--green)}
    .btn{width:100%;background:var(--green);color:#000;font-weight:800;font-size:15px;padding:13px;border:none;border-radius:8px;cursor:pointer;margin-top:20px;transition:all .2s;font-family:"Inter",sans-serif}
    .btn:hover{opacity:.9}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .msg{margin-top:14px;padding:12px;border-radius:8px;font-size:13px;text-align:center;display:none}
    .msg.ok{background:rgba(0,229,160,.1);border:1px solid rgba(0,229,160,.3);color:var(--green)}
    .msg.err{background:rgba(255,71,87,.1);border:1px solid rgba(255,71,87,.3);color:var(--red)}
    .back{text-align:center;margin-top:20px;font-size:13px;color:var(--muted)}
    .back a{color:var(--green);text-decoration:none;font-weight:600}
  </style>
</head>
<body>
<div class="box">
  <div class="logo">
    <div class="logo-icon">📈</div>
    <div class="logo-text">Trade<span>Journal</span></div>
  </div>
  <h2>Set a new password</h2>
  <p class="sub">Choose a strong password for your TradeJournal account.</p>
  <div>
    <label>New Password</label>
    <input type="password" id="password" placeholder="At least 6 characters" autofocus/>
    <label>Confirm Password</label>
    <input type="password" id="confirm" placeholder="Repeat your password"/>
  </div>
  <button class="btn" id="btn" onclick="submit()">Set New Password</button>
  <div class="msg" id="msg"></div>
  <div class="back"><a href="/login">← Back to Sign In</a></div>
</div>
<script>
const TOKEN = "{{ token }}";
async function submit() {
  const password = document.getElementById('password').value;
  const confirm = document.getElementById('confirm').value;
  const btn = document.getElementById('btn');
  const msg = document.getElementById('msg');
  if (password.length < 6) {
    msg.className='msg err'; msg.style.display='block';
    msg.textContent='Password must be at least 6 characters.'; return;
  }
  if (password !== confirm) {
    msg.className='msg err'; msg.style.display='block';
    msg.textContent='Passwords do not match.'; return;
  }
  btn.disabled=true; btn.textContent='Saving…';
  try {
    const r = await fetch('/reset-password/' + TOKEN, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({token: TOKEN, password})
    });
    const d = await r.json();
    if (d.ok) {
      msg.className='msg ok'; msg.style.display='block';
      msg.textContent='Password updated! Redirecting to login…';
      setTimeout(() => window.location.href='/login', 2000);
    } else {
      msg.className='msg err'; msg.style.display='block';
      msg.textContent = d.error || 'Something went wrong.';
      btn.disabled=false; btn.textContent='Set New Password';
    }
  } catch(e) {
    msg.className='msg err'; msg.style.display='block';
    msg.textContent='Something went wrong. Try again.';
    btn.disabled=false; btn.textContent='Set New Password';
  }
}
</script>
</body>
</html>
